<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - BookmarkD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="glass-nav fixed w-full z-50 top-0">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-2">
            <span class="logo-text">BookmarkD</span>
        </a>
        <div class="flex items-center gap-6">
            <a href="books.html" class="nav-link">Browse</a>
            <a href="browse-lists.html" class="nav-link">Lists</a>
            <a href="feed.html" class="nav-link">Feed</a>
            <a href="my-lists.html" class="nav-link">My Lists</a>
            <a href="stats.html" class="nav-link">Stats</a>
            <a href="embed.html" class="nav-link">Embed</a>
            <a href="profile.html" class="nav-link active">Profile</a>
            <button id="logoutBtn" class="nav-btn-logout">Logout</button>
        </div>
    </div>
</nav>

<main class="pt-24 pb-12">
    <div class="max-w-4xl mx-auto px-6">
        <div class="mb-8 animate-fade-in">
            <h1 class="text-4xl font-bold mb-2" id="username" style="font-family: var(--font-display);"></h1>
            <p id="email" style="color: var(--text-muted);"></p>
        </div>

        <div class="auth-card mb-8">
            <h2 class="text-xl font-bold mb-4" style="font-family: var(--font-display);">Your Stats</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <div class="text-center">
                    <div id="totalRatings" class="text-3xl font-bold gradient-text">0</div>
                    <div class="text-sm" style="color: var(--text-muted);">Books Rated</div>
                </div>
                <div class="text-center">
                    <div id="avgRating" class="text-3xl font-bold gradient-text">0.0</div>
                    <div class="text-sm" style="color: var(--text-muted);">Avg Rating</div>
                </div>
            </div>
        </div>

        <!-- Status Tabs -->
        <div class="mb-6">
            <div class="flex gap-1" style="border-bottom: 1px solid var(--border);">
                <button class="tab-btn active" data-status="all">All Books</button>
                <button class="tab-btn" data-status="to_read">To Read</button>
                <button class="tab-btn" data-status="currently_reading">Reading</button>
                <button class="tab-btn" data-status="finished_reading">Finished</button>
            </div>
        </div>

        <h2 class="text-2xl font-bold mb-6" id="sectionTitle" style="font-family: var(--font-display);">Your Books</h2>

        <div id="loading" class="text-center py-12">
            <div class="spinner"></div>
        </div>

        <div id="ratingsList" class="space-y-4 hidden"></div>

        <div id="noRatings" class="text-center py-12 hidden" style="color: var(--text-muted);">
            <p class="mb-4">You haven't rated any books yet.</p>
            <a href="books.html" class="btn-primary">Browse Books</a>
        </div>
    </div>
</main>

<script type="module" src="js/profile.js"></script>
</body>
</html>
