<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - BookmarkD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="glass-nav fixed w-full z-50 top-0">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-2">
            <span class="logo-text">BookmarkD</span>
        </a>
        <div class="flex items-center gap-6">
            <a href="books.html" class="nav-link">Browse</a>
            <a href="browse-lists.html" class="nav-link">Lists</a>
            <a href="feed.html" class="nav-link">Feed</a>
            <a href="profile.html" id="profileLink" class="nav-link hidden">My Profile</a>
            <a href="login.html" id="loginLink" class="nav-link">Login</a>
            <button id="logoutBtn" class="hidden nav-btn-logout">Logout</button>
        </div>
    </div>
</nav>

<main class="pt-24 pb-12">
    <div class="max-w-4xl mx-auto px-6">
        <div id="loading" class="text-center py-12">
            <div class="spinner"></div>
        </div>

        <div id="profileContent" class="hidden animate-fade-in">
            <div class="mb-8">
                <div class="flex justify-between items-start">
                    <div>
                        <h1 class="text-4xl font-bold mb-2" id="username" style="font-family: var(--font-display);"></h1>
                        <p id="email" style="color: var(--text-muted);"></p>
                    </div>
                    <button id="followBtn" class="hidden btn-primary"></button>
                </div>
            </div>

            <div class="auth-card mb-8">
                <h2 class="text-xl font-bold mb-5" style="font-family: var(--font-display);">Stats</h2>
                <div class="grid grid-cols-2 md:grid-cols-5 gap-6">
                    <div class="text-center">
                        <div id="totalBooks" class="text-3xl font-bold gradient-text">0</div>
                        <div class="text-sm" style="color: var(--text-muted);">Books</div>
                    </div>
                    <div class="text-center">
                        <div id="avgRating" class="text-3xl font-bold gradient-text">0.0</div>
                        <div class="text-sm" style="color: var(--text-muted);">Avg Rating</div>
                    </div>
                    <div class="text-center">
                        <div id="toReadCount" class="text-3xl font-bold gradient-text">0</div>
                        <div class="text-sm" style="color: var(--text-muted);">To Read</div>
                    </div>
                    <div class="text-center">
                        <div id="currentlyReading" class="text-3xl font-bold gradient-text">0</div>
                        <div class="text-sm" style="color: var(--text-muted);">Reading</div>
                    </div>
                    <div class="text-center">
                        <div id="finishedCount" class="text-3xl font-bold gradient-text">0</div>
                        <div class="text-sm" style="color: var(--text-muted);">Finished</div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-6 mt-6" style="border-top: 1px solid var(--border); padding-top: 1.25rem;">
                    <div class="text-center cursor-pointer group" id="followersBtn">
                        <div id="followersCount" class="text-2xl font-bold group-hover:text-accent transition">0</div>
                        <div class="text-sm" style="color: var(--text-muted);">Followers</div>
                    </div>
                    <div class="text-center cursor-pointer group" id="followingBtn">
                        <div id="followingCount" class="text-2xl font-bold group-hover:text-accent transition">0</div>
                        <div class="text-sm" style="color: var(--text-muted);">Following</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Followers/Following Modal -->
<div id="followModal" class="fixed inset-0 hidden items-center justify-center z-50" style="background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);" onclick="closeModal()">
    <div class="mx-4 max-w-md w-full" style="background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem;" onclick="event.stopPropagation()">
        <div class="flex justify-between items-center mb-4">
            <h3 id="modalTitle" class="text-2xl font-bold" style="font-family: var(--font-display);"></h3>
            <button onclick="closeModal()" class="text-2xl cursor-pointer" style="color: var(--text-muted);">&times;</button>
        </div>
        <div id="modalContent" class="space-y-3 max-h-96 overflow-y-auto"></div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script type="module" src="js/user-profile.js"></script>
</body>
</html>
