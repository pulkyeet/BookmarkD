<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Detail - BookmarkD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="glass-nav fixed w-full z-50 top-0">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-2">
            <span class="logo-text">BookmarkD</span>
        </a>
        <div class="flex items-center gap-6">
            <a href="books.html" class="nav-link">Browse</a>
            <a href="browse-lists.html" class="nav-link">Lists</a>
            <a href="feed.html" class="nav-link">Feed</a>
            <a href="my-lists.html" class="nav-link">My Lists</a>
            <a href="profile.html" id="profileLink" class="nav-link">Profile</a>
            <button id="logoutBtn" class="hidden nav-btn-logout">Logout</button>
        </div>
    </div>
</nav>

<main class="pt-24 pb-12">
    <div class="max-w-6xl mx-auto px-6">
        <a href="my-lists.html" class="inline-flex items-center gap-1.5 text-sm mb-8 transition" style="color: var(--text-muted);"
           onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-muted)'">
            &larr; Back to My Lists
        </a>

        <div id="loading" class="text-center py-12">
            <div class="spinner"></div>
        </div>

        <div id="listDetail" class="hidden animate-fade-in">
            <div class="mb-8">
                <h1 id="listName" class="text-4xl font-bold mb-2" style="font-family: var(--font-display);"></h1>
                <p id="listDescription" class="mb-4" style="color: var(--text-secondary);"></p>
                <div class="flex items-center gap-4 text-sm" style="color: var(--text-muted);">
                    <span id="listCreator" style="color: var(--accent);"></span>
                    <span id="listVisibility"></span>
                    <span id="listCreated"></span>
                    <span id="bookCount"></span>
                </div>
                <div class="mt-4">
                    <button id="embedBtn" class="btn-secondary hidden">
                        Embed This List
                    </button>
                </div>
            </div>

            <div id="emptyList" class="hidden text-center py-12 rounded-lg" style="background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);">
                <p class="mb-2" style="color: var(--text-muted);">This list is empty</p>
                <p class="text-sm" style="color: var(--text-muted);">Add books by clicking "Add to List" on any book detail page</p>
            </div>

            <div id="booksContainer" class="hidden">
                <div class="mb-4 p-3 rounded-lg text-sm" style="background: var(--accent-dim); border: 1px solid rgba(212,165,116,0.15); border-radius: var(--radius-md); color: var(--accent);">
                    Drag and drop books to reorder them
                </div>
                <div id="booksList" class="space-y-3"></div>
            </div>
        </div>
    </div>
</main>

<div id="toast" class="toast"></div>

<script type="module" src="js/list-detail.js"></script>
</body>
</html>
