<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Books - BookmarkD</title>
    <meta name="description" content="Discover and explore thousands of books. Find trending titles, popular reads, and your next favorite book.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bookmarkd.app/books">
    <meta property="og:title" content="Browse Books - BookmarkD">
    <meta property="og:description" content="Discover thousands of books and find your next read">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Browse Books - BookmarkD">
    <meta name="twitter:description" content="Discover thousands of books and find your next read">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="glass-nav fixed w-full z-50 top-0">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-2">
            <span class="logo-text">BookmarkD</span>
        </a>
        <div class="flex items-center gap-6">
            <a href="books.html" class="nav-link active">Browse</a>
            <a href="browse-lists.html" class="nav-link">Lists</a>
            <a href="feed.html" class="nav-link">Feed</a>
            <a href="my-lists.html" id="myListsLink" class="nav-link hidden">My Lists</a>
            <a href="profile.html" id="profileLink" class="nav-link hidden">Profile</a>
            <a href="login.html" id="loginLink" class="nav-link">Login</a>
            <button id="logoutBtn" class="hidden nav-btn-logout">Logout</button>
        </div>
    </div>
</nav>

<main class="pt-24 pb-12">
    <div class="max-w-6xl mx-auto px-6">
        <div class="mb-8 animate-fade-in">
            <h1 class="text-4xl font-bold mb-6" style="font-family: var(--font-display);">Browse Books</h1>

            <!-- Tabs -->
            <div class="flex gap-1 mb-6" style="border-bottom: 1px solid var(--border);">
                <button id="allTab" class="tab-btn active">All Books</button>
                <button id="trendingTab" class="tab-btn">Trending</button>
                <button id="popularTab" class="tab-btn">Popular</button>
            </div>

            <!-- Search and Filter -->
            <div class="flex flex-col md:flex-row gap-3">
                <div class="flex-1">
                    <input type="text" id="searchInput" placeholder="Search by title or author..."
                           class="input-field w-full" style="padding: 0.75rem 1rem;">
                </div>
                <select id="genreFilter" class="input-field" style="width: auto; min-width: 180px;">
                    <option value="">All Genres</option>
                </select>
                <button id="searchBtn" class="btn-primary" style="padding: 0.75rem 2rem;">Search</button>
            </div>
        </div>

        <div id="loading" class="text-center py-12">
            <div class="spinner"></div>
            <p class="mt-4 text-sm" style="color: var(--text-muted);">Loading books...</p>
        </div>

        <div id="booksGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 hidden"></div>

        <div id="pagination" class="mt-12 flex justify-center gap-4 hidden">
            <button id="prevBtn" class="btn-secondary">Previous</button>
            <span id="pageInfo" class="flex items-center text-sm" style="color: var(--text-muted);"></span>
            <button id="nextBtn" class="btn-secondary">Next</button>
        </div>
    </div>
</main>

<script type="module" src="js/books.js"></script>
</body>
</html>
