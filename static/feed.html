<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed - BookmarkD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="glass-nav fixed w-full z-50 top-0">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-2">
            <span class="logo-text">BookmarkD</span>
        </a>
        <div class="flex items-center gap-6">
            <a href="books.html" class="nav-link">Browse</a>
            <a href="browse-lists.html" class="nav-link">Lists</a>
            <a href="feed.html" class="nav-link active">Feed</a>
            <a href="my-lists.html" id="myListsLink" class="nav-link hidden">My Lists</a>
            <a href="profile.html" id="profileLink" class="nav-link hidden">Profile</a>
            <a href="login.html" id="loginLink" class="nav-link">Login</a>
            <button id="logoutBtn" class="hidden nav-btn-logout">Logout</button>
        </div>
    </div>
</nav>

<main class="pt-24 pb-12">
    <div class="max-w-4xl mx-auto px-6">
        <div class="flex justify-between items-center mb-8 animate-fade-in">
            <h1 class="text-4xl font-bold" style="font-family: var(--font-display);">Activity Feed</h1>

            <div id="feedToggle" class="hidden flex gap-2">
                <button id="allFeedBtn" class="btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.8125rem;">Everyone</button>
                <button id="followingFeedBtn" class="btn-primary" style="padding: 0.5rem 1rem; font-size: 0.8125rem;">Following</button>
            </div>
        </div>

        <div id="loading" class="text-center py-12">
            <div class="spinner"></div>
        </div>

        <div id="feedList" class="space-y-4 hidden"></div>

        <div id="loadMoreContainer" class="text-center mt-8 hidden">
            <button id="loadMoreBtn" class="btn-secondary">Load More</button>
        </div>

        <div id="noActivity" class="text-center py-12 hidden" style="color: var(--text-muted);">
            <p class="mb-4">No activity yet.</p>
            <a href="books.html" class="btn-primary">Browse Books</a>
        </div>
    </div>
</main>

<script type="module" src="js/feed.js"></script>
<div id="toast" class="toast"></div>
</body>
</html>
