<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BookmarkD</title>
    <meta name="description" content="Login to BookmarkD to track your books, write reviews, and discover your next great read.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="glass-nav fixed w-full z-50 top-0">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-2">
            <span class="logo-text">BookmarkD</span>
        </a>
        <div class="flex items-center gap-6">
            <a href="books.html" class="nav-link">Browse</a>
            <a href="signup.html" class="btn-primary" style="padding: 0.5rem 1.25rem; font-size: 0.8125rem;">Sign Up</a>
        </div>
    </div>
</nav>

<main class="pt-32 min-h-screen flex items-center justify-center px-6">
    <div class="auth-card max-w-md w-full animate-fade-in" style="padding: 2.5rem;">
        <h1 class="text-3xl font-bold mb-2 text-center" style="font-family: var(--font-display);">Welcome back</h1>
        <p class="text-center mb-8" style="color: var(--text-muted);">Login to continue your reading journey</p>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary);">Email</label>
                <input type="email" id="email" required
                       class="input-field" placeholder="you@example.com">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary);">Password</label>
                <input type="password" id="password" required
                       class="input-field" placeholder="Enter your password">
            </div>

            <div id="errorMessage" class="hidden p-3 rounded-lg text-sm" style="background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); color: var(--error); border-radius: var(--radius-md);"></div>

            <button type="submit" class="btn-primary w-full">Login</button>
        </form>

        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full" style="border-top: 1px solid var(--border);"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-3" style="background: var(--bg-card); color: var(--text-muted);">Or continue with</span>
            </div>
        </div>

        <a href="/api/auth/google"
           class="w-full flex items-center justify-center gap-3 px-4 py-3 rounded-lg transition"
           style="border: 1px solid var(--border); border-radius: var(--radius-md);"
           onmouseover="this.style.background='var(--bg-elevated)'" onmouseout="this.style.background='transparent'">
            <svg width="20" height="20" viewBox="0 0 20 20">
                <path fill="#4285F4" d="M19.6 10.23c0-.82-.1-1.42-.25-2.05H10v3.72h5.5c-.15.96-.74 2.31-2.04 3.22v2.45h3.16c1.89-1.73 2.98-4.3 2.98-7.34z"/>
                <path fill="#34A853" d="M13.46 15.13c-.83.59-1.96 1-3.46 1-2.64 0-4.88-1.74-5.68-4.15H1.07v2.52C2.72 17.75 6.09 20 10 20c2.7 0 4.96-.89 6.62-2.42l-3.16-2.45z"/>
                <path fill="#FBBC05" d="M3.99 10c0-.69.12-1.35.32-1.97V5.51H1.07A9.973 9.973 0 000 10c0 1.61.39 3.14 1.07 4.49l3.24-2.52c-.2-.62-.32-1.28-.32-1.97z"/>
                <path fill="#EA4335" d="M10 3.88c1.88 0 3.13.81 3.85 1.48l2.84-2.76C14.96.99 12.7 0 10 0 6.09 0 2.72 2.25 1.07 5.51l3.24 2.52C5.12 5.62 7.36 3.88 10 3.88z"/>
            </svg>
            <span class="font-semibold text-sm">Sign in with Google</span>
        </a>

        <p class="text-center mt-6 text-sm" style="color: var(--text-muted);">
            Don't have an account?
            <a href="signup.html" class="font-medium" style="color: var(--accent);">Sign up</a>
        </p>
    </div>
</main>

<script type="module" src="js/auth.js"></script>
</body>
</html>
