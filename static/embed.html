<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embed Generator - BookmarkD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="glass-nav fixed w-full z-50 top-0">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-2">
            <span class="logo-text">BookmarkD</span>
        </a>
        <div class="flex items-center gap-6">
            <a href="books.html" class="nav-link">Browse</a>
            <a href="feed.html" class="nav-link">Feed</a>
            <a href="profile.html" class="nav-link">Profile</a>
            <button id="logoutBtn" class="nav-btn-logout">Logout</button>
        </div>
    </div>
</nav>

<main class="pt-24 pb-12">
    <div class="max-w-6xl mx-auto px-6">
        <div class="mb-8 animate-fade-in">
            <h1 class="text-4xl font-bold mb-2" style="font-family: var(--font-display);">Embed Your Books</h1>
            <p style="color: var(--text-muted);">Showcase your books on your personal website or blog</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Configuration Panel -->
            <div class="space-y-5">
                <div class="auth-card">
                    <h2 class="text-xl font-bold mb-5" style="font-family: var(--font-display);">Configure Embed</h2>

                    <div class="mb-4">
                        <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary);">Source</label>
                        <select id="sourceType" class="input-field w-full">
                            <option value="top_rated">My Top Rated Books</option>
                            <option value="list">Specific List</option>
                        </select>
                    </div>

                    <div id="listSelector" class="mb-4 hidden">
                        <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary);">Select List</label>
                        <select id="listSelect" class="input-field w-full">
                            <option value="">Loading lists...</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary);">Number of Books</label>
                        <select id="bookCount" class="input-field w-full">
                            <option value="3">3 books</option>
                            <option value="5" selected>5 books</option>
                            <option value="10">10 books</option>
                        </select>
                    </div>

                    <div class="mb-5">
                        <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary);">Display Style</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button class="style-btn active" data-style="grid">
                                <div class="text-xl mb-1">&#8862;</div>
                                Grid
                            </button>
                            <button class="style-btn" data-style="list">
                                <div class="text-xl mb-1">&#9776;</div>
                                List
                            </button>
                            <button class="style-btn" data-style="minimal">
                                <div class="text-xl mb-1">&#9645;</div>
                                Minimal
                            </button>
                        </div>
                    </div>

                    <button id="generateBtn" class="btn-primary w-full">Generate Embed Code</button>
                </div>

                <!-- Code Output -->
                <div id="codeOutput" class="auth-card hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-bold" style="font-family: var(--font-display);">Embed Code</h3>
                        <div class="flex gap-2">
                            <button class="code-tab active" data-tab="iframe">Iframe</button>
                            <button class="code-tab" data-tab="script">Script Tag</button>
                        </div>
                    </div>

                    <div id="iframeCode" class="code-block">
                        <pre class="p-4 rounded text-xs overflow-x-auto" style="background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md);"><code id="iframeCodeContent"></code></pre>
                        <button id="copyIframe" class="btn-secondary w-full mt-3">Copy Code</button>
                    </div>

                    <div id="scriptCode" class="code-block hidden">
                        <pre class="p-4 rounded text-xs overflow-x-auto" style="background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md);"><code id="scriptCodeContent"></code></pre>
                        <button id="copyScript" class="btn-secondary w-full mt-3">Copy Code</button>
                    </div>
                </div>
            </div>

            <!-- Live Preview -->
            <div class="auth-card">
                <h2 class="text-xl font-bold mb-4" style="font-family: var(--font-display);">Live Preview</h2>
                <div class="p-4 min-h-[400px]" style="border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--bg-surface);">
                    <iframe id="previewFrame" class="w-full h-full min-h-[400px] border-0"></iframe>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="toast" class="toast"></div>

<script src="js/embed.js"></script>
</body>
</html>
