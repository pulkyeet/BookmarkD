<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details - BookmarkD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="glass-nav fixed w-full z-50 top-0">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-2">
            <span class="logo-text">BookmarkD</span>
        </a>
        <div class="flex items-center gap-6">
            <a href="books.html" class="nav-link">Browse</a>
            <a href="browse-lists.html" class="nav-link">Lists</a>
            <a href="feed.html" class="nav-link">Feed</a>
            <a href="my-lists.html" id="myListsLink" class="nav-link hidden">My Lists</a>
            <a href="profile.html" id="profileLink" class="nav-link hidden">Profile</a>
            <a href="login.html" id="loginLink" class="nav-link">Login</a>
            <button id="logoutBtn" class="hidden nav-btn-logout">Logout</button>
        </div>
    </div>
</nav>

<main class="pt-24 pb-12">
    <div class="max-w-6xl mx-auto px-6">
        <a href="books.html" class="inline-flex items-center gap-1.5 text-sm mb-8 transition" style="color: var(--text-muted);"
           onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-muted)'">
            &larr; Back to Books
        </a>

        <div id="loading" class="text-center py-12">
            <div class="spinner"></div>
        </div>

        <div id="bookDetail" class="hidden animate-fade-in">
            <div class="grid md:grid-cols-3 gap-10">
                <!-- Cover -->
                <div>
                    <img id="bookCover" class="w-full rounded shadow-2xl book-cover" style="border-radius: var(--radius-lg);" alt="Book cover">
                </div>

                <!-- Details -->
                <div class="md:col-span-2">
                    <h1 id="bookTitle" class="text-4xl font-bold mb-2" style="font-family: var(--font-display);"></h1>
                    <p id="bookAuthor" class="text-xl mb-6" style="color: var(--text-secondary);"></p>

                    <div class="flex items-center gap-4 mb-6">
                        <div class="rating-display" id="avgRating">0.0</div>
                        <div>
                            <div class="text-sm" style="color: var(--text-muted);">Average Rating</div>
                            <div id="totalRatings" class="text-sm" style="color: var(--text-muted);"></div>
                        </div>
                    </div>

                    <div id="bookGenres" class="mb-4"></div>

                    <div class="mb-6">
                        <p id="publishedYear" class="text-sm" style="color: var(--text-muted);"></p>
                        <p id="bookISBN" class="text-sm mt-1" style="color: var(--text-muted);"></p>
                    </div>

                    <div class="mb-8">
                        <h3 class="text-xl font-bold mb-3" style="font-family: var(--font-display);">Description</h3>
                        <p id="bookDescription" class="leading-relaxed" style="color: var(--text-secondary);"></p>
                    </div>

                    <!-- Rating Section (auth only) -->
                    <div id="ratingSection" class="auth-card hidden">
                        <h3 class="text-xl font-bold mb-4" style="font-family: var(--font-display);">Your Status</h3>

                        <div class="mb-6">
                            <label class="block text-sm font-medium mb-3" style="color: var(--text-secondary);">Reading Status</label>
                            <div class="flex gap-2 flex-wrap">
                                <button type="button" class="status-btn" data-status="to_read">Want to Read</button>
                                <button type="button" class="status-btn" data-status="currently_reading">Reading</button>
                                <button type="button" class="status-btn" data-status="finished_reading">Finished</button>
                            </div>
                        </div>

                        <h3 class="text-xl font-bold mb-4" style="font-family: var(--font-display);">Rate this book</h3>
                        <form id="ratingForm">
                            <div class="mb-4">
                                <label class="block text-sm font-medium mb-3" style="color: var(--text-secondary);">Your Rating (1-10)</label>
                                <div class="rating-input-wrapper">
                                    <button type="button" class="rating-btn" data-rating="1">1</button>
                                    <button type="button" class="rating-btn" data-rating="2">2</button>
                                    <button type="button" class="rating-btn" data-rating="3">3</button>
                                    <button type="button" class="rating-btn" data-rating="4">4</button>
                                    <button type="button" class="rating-btn" data-rating="5">5</button>
                                    <button type="button" class="rating-btn" data-rating="6">6</button>
                                    <button type="button" class="rating-btn" data-rating="7">7</button>
                                    <button type="button" class="rating-btn" data-rating="8">8</button>
                                    <button type="button" class="rating-btn" data-rating="9">9</button>
                                    <button type="button" class="rating-btn" data-rating="10">10</button>
                                </div>
                                <input type="hidden" id="ratingValue">
                            </div>

                            <div class="mb-4">
                                <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary);">Review (optional)</label>
                                <textarea id="reviewText" rows="4" class="input-field"
                                          placeholder="Share your thoughts..."></textarea>
                            </div>

                            <button type="submit" class="btn-primary w-full">Submit Rating</button>
                            <button type="button" id="addToListBtn" class="btn-secondary w-full mt-3">Add to List</button>
                        </form>
                    </div>

                    <div id="loginPrompt" class="hidden p-4 rounded-lg" style="background: var(--accent-dim); border: 1px solid rgba(212,165,116,0.2); border-radius: var(--radius-md);">
                        <p style="color: var(--accent);">
                            <a href="login.html" class="underline font-medium">Login</a> to rate this book
                        </p>
                    </div>
                </div>
            </div>

            <!-- Reviews -->
            <div class="mt-16" style="border-top: 1px solid var(--border); padding-top: 2rem;">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold" style="font-family: var(--font-display);">Reviews</h2>
                    <select id="sortSelect" class="input-field" style="width: auto; padding: 0.5rem 2.5rem 0.5rem 1rem; font-size: 0.875rem;">
                        <option value="newest">Newest First</option>
                        <option value="most_liked">Most Liked</option>
                        <option value="highest_rating">Highest Rating</option>
                    </select>
                </div>
                <div id="reviewsList" class="space-y-4"></div>
                <div id="noReviews" class="text-center py-8 hidden" style="color: var(--text-muted);">
                    No reviews yet. Be the first to rate!
                </div>
            </div>

            <!-- Similar Books -->
            <div id="similarBooksSection" class="hidden mt-16" style="border-top: 1px solid var(--border); padding-top: 2rem;">
                <h2 class="text-2xl font-bold mb-6" style="font-family: var(--font-display);">You Might Also Like</h2>
                <div id="similarBooksGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4"></div>
            </div>
        </div>
    </div>
</main>

<!-- Add to List Modal -->
<div id="addToListModal" class="hidden fixed inset-0 flex items-center justify-center z-50" style="background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);">
    <div class="mx-4 max-w-md w-full" style="background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem;">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold" style="font-family: var(--font-display);">Add to List</h3>
            <button id="closeModal" class="text-2xl cursor-pointer" style="color: var(--text-muted);">&times;</button>
        </div>
        <div id="listSelectionContainer" class="max-h-64 overflow-y-auto mb-4"></div>
        <button id="confirmAddToList" class="btn-primary w-full">Add to Selected Lists</button>
    </div>
</div>

<script type="module" src="js/book-detail.js?v=3"></script>

<div id="toast" class="toast"></div>
</body>
</html>
