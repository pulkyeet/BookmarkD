<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Lists - BookmarkD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="glass-nav fixed w-full z-50 top-0">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-2">
            <span class="logo-text">BookmarkD</span>
        </a>
        <div class="flex items-center gap-6">
            <a href="books.html" class="nav-link">Browse</a>
            <a href="browse-lists.html" class="nav-link">Lists</a>
            <a href="feed.html" class="nav-link">Feed</a>
            <a href="my-lists.html" class="nav-link active">My Lists</a>
            <a href="profile.html" id="profileLink" class="nav-link">Profile</a>
            <button id="logoutBtn" class="nav-btn-logout">Logout</button>
        </div>
    </div>
</nav>

<main class="pt-24 pb-12">
    <div class="max-w-6xl mx-auto px-6">
        <div class="flex justify-between items-center mb-8 animate-fade-in">
            <h1 class="text-4xl font-bold" style="font-family: var(--font-display);">My Lists</h1>
            <button id="createListBtn" class="btn-primary">+ Create List</button>
        </div>

        <div id="loading" class="text-center py-12">
            <div class="spinner"></div>
            <p class="mt-4 text-sm" style="color: var(--text-muted);">Loading your lists...</p>
        </div>

        <div id="listsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 hidden"></div>

        <div id="emptyState" class="hidden text-center py-16">
            <p class="text-lg mb-4" style="color: var(--text-muted);">You don't have any lists yet</p>
            <button class="btn-primary" onclick="document.getElementById('createListBtn').click()">Create Your First List</button>
        </div>
    </div>
</main>

<!-- Create/Edit List Modal -->
<div id="listModal" class="hidden fixed inset-0 flex items-center justify-center z-50" style="background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);">
    <div class="mx-4 max-w-md w-full" style="background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem;">
        <div class="flex justify-between items-center mb-4">
            <h3 id="modalTitle" class="text-xl font-bold" style="font-family: var(--font-display);">Create New List</h3>
            <button id="closeModal" class="text-2xl cursor-pointer" style="color: var(--text-muted);">&times;</button>
        </div>
        <form id="listForm">
            <div class="mb-4">
                <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary);">List Name</label>
                <input type="text" id="listName" class="input-field w-full" required>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary);">Description (optional)</label>
                <textarea id="listDescription" rows="3" class="input-field w-full"></textarea>
            </div>
            <div class="mb-5">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="listPublic" checked class="w-4 h-4 rounded accent-amber-600">
                    <span class="text-sm" style="color: var(--text-secondary);">Make this list public</span>
                </label>
            </div>
            <button type="submit" class="btn-primary w-full">Create List</button>
        </form>
    </div>
</div>

<div id="toast" class="toast"></div>

<script type="module" src="js/my-lists.js"></script>
</body>
</html>
